<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandate Vacuum - Governance Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
      
      :root {
        --bg-color: #F4F3EE;
        --primary-heading: #9C7A3C;
        --sub-heading: #5A4628;
        --body-text: #1E1E1E;
        --secondary-text: #6A6A6A;
        --insight-color: #7B2D2D;
      }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg-color);
        color: var(--body-text);
      }
      h1, .h1-style { color: var(--primary-heading); }
      h2, h3, h4, .h-sub { color: var(--sub-heading); }
      p, .text-body { color: var(--body-text); }
      .text-secondary { color: var(--secondary-text); }
      .text-insight { color: var(--insight-color); }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #9C7A3C; border-radius: 10px; }
    </style>
</head>
<body class="antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
